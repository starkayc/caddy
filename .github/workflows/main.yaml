name: Build and Push Docker Image
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          show-progress: false
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Prepare Environment Outputs
        shell: sh
        run: |
          set -eu

          echo "GHCR_REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "DH_REPOSITORY=$(echo ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          export VERSION=$(curl --silent "https://api.github.com/repos/caddyserver/caddy/releases/latest" | grep -Po "(?<=\"tag_name\": \").*(?=\")" | cut -d'v' -f2)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build and publish Docker image from Dockerfile
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ env.VERSION }}
            ${{ env.DH_REPOSITORY }}:${{ env.VERSION }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:v${{ env.VERSION }}
            ${{ env.DH_REPOSITORY }}:v${{ env.VERSION }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:latest
            ${{ env.DH_REPOSITORY }}:latest
          build-args: |
            CADDY_VERSION=${{ env.VERSION }}
          push: true
